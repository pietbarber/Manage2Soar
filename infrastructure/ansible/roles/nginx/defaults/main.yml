# NGINX Role Defaults
# These can be overridden in group_vars or host_vars
---
# Domain configuration
nginx_server_name: "{{ m2s_domain | default('localhost') }}"

# SSL/TLS Configuration
nginx_ssl_enabled: true
nginx_ssl_certificate: "/etc/letsencrypt/live/{{ nginx_server_name }}/fullchain.pem"
nginx_ssl_certificate_key: "/etc/letsencrypt/live/{{ nginx_server_name }}/privkey.pem"

# Listener ports. Override these in group_vars/host_vars for non-standard ports.
nginx_http_port: 80
nginx_https_port: 443

# Public proxy mode
# Enable when another proxy owns public 80/443 and TLS certificates.
# M2S nginx listens on an HTTP backend for that proxy.
# By default the backend is localhost-only. Set
# nginx_public_proxy_allow_private_bind: true only when the public proxy reaches
# M2S over a private/container network.
nginx_public_proxy_mode: false
nginx_proxy_listen_address: "127.0.0.1"
nginx_proxy_http_port: 8080
nginx_external_scheme: "https"
nginx_external_port: 443
nginx_public_proxy_real_ip_from: "127.0.0.1"
nginx_public_proxy_allow_private_bind: false

# Let's Encrypt
letsencrypt_email: "admin@{{ nginx_server_name }}"

# HTTP/2
nginx_http2_enabled: true

# Upstream (Gunicorn)
nginx_upstream_name: "m2s_app"
nginx_upstream_server: "127.0.0.1:8000"

# Static and media files
nginx_static_root: "/var/www/m2s/static"
nginx_media_root: "/var/www/m2s/media"
nginx_static_url: "/static/"
nginx_media_url: "/media/"

# Logging
nginx_access_log: "/var/log/nginx/m2s_access.log"
nginx_error_log: "/var/log/nginx/m2s_error.log"

# Rate limiting
nginx_rate_limit_enabled: true
nginx_rate_limit_zone: "m2s_limit"
nginx_rate_limit: "10r/s"
nginx_rate_limit_burst: 20

# Client settings
nginx_client_max_body_size: "50M"

# Security headers
nginx_security_headers_enabled: true

# Worker settings (auto = number of CPU cores)
nginx_worker_processes: "auto"
nginx_worker_connections: 1024

# Gzip compression
nginx_gzip_enabled: true
nginx_gzip_types:
  - text/plain
  - text/css
  - text/javascript
  - application/javascript
  - application/json
  - application/xml
  - image/svg+xml

# Cache settings for static files
nginx_static_cache_time: "30d"
nginx_media_cache_time: "7d"
