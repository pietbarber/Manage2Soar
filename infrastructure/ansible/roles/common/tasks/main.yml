---
# ============================================================
# Common Role - Base System Setup
# ============================================================

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ mail_hostname }}"

- name: Update /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1 {{ mail_hostname }} {{ mail_hostname.split('.')[0] }}"
    state: present

- name: Install base packages
  ansible.builtin.apt:
    name:
      - vim
      - htop
      - curl
      - wget
      - unzip
      - fail2ban
      - ufw
      - python3
      - python3-pip
      - python3-requests
      - python3-yaml
      - mailutils
    state: present

- name: Validate SSH key format
  ansible.builtin.assert:
    that:
      - item.key is defined
      - item.key | length > 0
      - item.key is match('^(ssh-rsa|ssh-ed25519|ecdsa-sha2-nistp256|ecdsa-sha2-nistp384|ecdsa-sha2-nistp521) ')
    fail_msg: "Invalid SSH key format for user {{ item.user }}: {{ (item.key | default('key not defined'))[:50] }}..."
    quiet: yes
  loop: "{{ admin_ssh_keys }}"
  when: admin_ssh_keys is defined

- name: Create admin user accounts for SSH access
  ansible.builtin.user:
    name: "{{ item.user }}"
    shell: /bin/bash
    create_home: yes
    state: present
  loop: "{{ admin_ssh_keys }}"
  when: admin_ssh_keys is defined

- name: Add SSH keys to admin user authorized_keys
  ansible.posix.authorized_key:
    user: "{{ item.user }}"
    key: "{{ item.key }}"
    state: present
    exclusive: no
  loop: "{{ admin_ssh_keys }}"
  when: admin_ssh_keys is defined

- name: Add admin users to sudo group
  ansible.builtin.user:
    name: "{{ item.user }}"
    groups: sudo
    append: yes
  loop: "{{ admin_ssh_keys }}"
  when: admin_ssh_keys is defined

- name: Configure UFW defaults
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }

- name: Allow SSH from specific IPs (if configured)
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    from_ip: "{{ item }}"
  loop: "{{ admin_ssh_ips }}"
  when: admin_ssh_ips is defined and admin_ssh_ips | length > 0

- name: Allow SSH from anywhere (if no IPs configured)
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
  when: admin_ssh_ips is not defined or admin_ssh_ips | length == 0

- name: Allow SMTP
  community.general.ufw:
    rule: allow
    port: "25"
    proto: tcp

- name: Remove legacy open submission rule (587)
  community.general.ufw:
    rule: allow
    port: "587"
    proto: tcp
    delete: true

- name: Build UFW submission source candidate list
  ansible.builtin.set_fact:
    ufw_smtp_submission_sources_candidate: "{{ gcp_smtp_submission_allowed_sources | default(((trusted_relay_ips | default([])) + (admin_ssh_ips | default([])) + ((gcp_smtp_allowed_sources | default([])) | reject('equalto', '0.0.0.0/0') | list)) | unique | list) }}"
  when: (gcp_enable_submission_smtp | default(true)) | bool

- name: Build effective UFW submission source list
  ansible.builtin.set_fact:
    ufw_smtp_submission_sources_effective: "{{ ufw_smtp_submission_sources_candidate if ((gcp_allow_public_submission | default(false)) | bool) else (ufw_smtp_submission_sources_candidate | reject('equalto', '0.0.0.0/0') | list) }}"
  when: (gcp_enable_submission_smtp | default(true)) | bool

- name: Validate UFW submission sources are not public by default
  ansible.builtin.assert:
    that:
      - ((gcp_allow_public_submission | default(false)) | bool) or ('0.0.0.0/0' not in (ufw_smtp_submission_sources_candidate | default([])))
    fail_msg: >-
      UFW submission sources include 0.0.0.0/0, which would expose port 587 publicly.
      Remove 0.0.0.0/0 from gcp_smtp_submission_allowed_sources or set gcp_allow_public_submission=true intentionally.
  when:
    - (gcp_enable_submission_smtp | default(true)) | bool
    - ufw_smtp_submission_sources_candidate is defined

- name: Validate UFW submission sources are present when submission is enabled
  ansible.builtin.assert:
    that:
      - (ufw_smtp_submission_sources_effective | default([]) | length) > 0
    fail_msg: >-
      Submission SMTP is enabled, but no trusted UFW source ranges were configured.
      Set gcp_smtp_submission_allowed_sources, or define trusted_relay_ips/admin_ssh_ips.
  when: (gcp_enable_submission_smtp | default(true)) | bool

- name: Remove existing UFW submission allow rules (587) when submission enabled
  ansible.builtin.shell: |
    set -o pipefail
    ufw status numbered | awk -F'[\[\]]' '/587\/tcp/ && /ALLOW IN/ {gsub(/ /, "", $2); if ($2 != "") print $2}' | sort -rn | while read -r rule_no; do
      ufw --force delete "$rule_no"
    done
  args:
    executable: /bin/bash
  register: ufw_remove_submission_allow_rules
  changed_when: ufw_remove_submission_allow_rules.stdout | length > 0
  when:
    - not ansible_check_mode
    - (gcp_enable_submission_smtp | default(true)) | bool

- name: Allow submission (587) from trusted app/admin sources
  community.general.ufw:
    rule: allow
    port: "587"
    proto: tcp
    from_ip: "{{ item }}"
  loop: "{{ ufw_smtp_submission_sources_effective | default([]) }}"
  when: (gcp_enable_submission_smtp | default(true)) | bool

- name: Remove existing UFW submission allow rules (587) when submission disabled
  ansible.builtin.shell: |
    set -o pipefail
    ufw status numbered | awk -F'[\[\]]' '/587\/tcp/ && /ALLOW IN/ {gsub(/ /, "", $2); if ($2 != "") print $2}' | sort -rn | while read -r rule_no; do
      ufw --force delete "$rule_no"
    done
  args:
    executable: /bin/bash
  register: ufw_remove_submission_allow_rules_disabled
  changed_when: ufw_remove_submission_allow_rules_disabled.stdout | length > 0
  when:
    - not ansible_check_mode
    - not ((gcp_enable_submission_smtp | default(true)) | bool)

- name: Deny submission (587) when submission disabled
  community.general.ufw:
    rule: deny
    port: "587"
    proto: tcp
  when: not ((gcp_enable_submission_smtp | default(true)) | bool)

- name: Remove submission deny rule (587) when submission enabled
  community.general.ufw:
    rule: deny
    port: "587"
    proto: tcp
    delete: true
  when: (gcp_enable_submission_smtp | default(true)) | bool

- name: Remove legacy open HTTP rule (80)
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp
    delete: true
  when: (letsencrypt_email | default('') | length) == 0

- name: Deny HTTP (80)
  community.general.ufw:
    rule: deny
    port: "80"
    proto: tcp
  when: (letsencrypt_email | default('') | length) == 0

- name: Remove HTTP deny rule (80) when Let's Encrypt is enabled
  community.general.ufw:
    rule: deny
    port: "80"
    proto: tcp
    delete: true
  when: (letsencrypt_email | default('') | length) > 0

- name: Allow HTTP (80) for Let's Encrypt HTTP-01 challenge
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp
  when: (letsencrypt_email | default('') | length) > 0

- name: Enable UFW
  community.general.ufw:
    state: enabled

- name: Install certbot for Let's Encrypt certificates
  ansible.builtin.apt:
    name:
      - certbot
    state: present
  when: (letsencrypt_email | default('') | length) > 0

- name: Obtain Let's Encrypt certificate (if not exists)
  ansible.builtin.command: >
    certbot certonly --standalone --non-interactive --agree-tos
    --email {{ letsencrypt_email }}
    --domains {{ mail_hostname }}
  args:
    creates: /etc/letsencrypt/live/{{ mail_hostname }}/fullchain.pem
  when: (letsencrypt_email | default('') | length) > 0

- name: Deploy postfix-sasl fail2ban filter
  ansible.builtin.template:
    src: fail2ban-postfix-sasl.conf.j2
    dest: /etc/fail2ban/filter.d/postfix-sasl.conf
    mode: "0644"
  notify: Restart fail2ban

- name: Configure fail2ban for postfix
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime = 3600
      findtime = 600
      maxretry = 5

      [postfix]
      enabled = true
      port = smtp,submission
      filter = postfix
      logpath = /var/log/mail.log
      datepattern = %%Y-%%m-%%dT%%H:%%M:%%S
                    {^LN-BEG}%%Y-%%m-%%dT%%H:%%M:%%S
            %%b %%d %%H:%%M:%%S
            {^LN-BEG}%%b %%d %%H:%%M:%%S

      [postfix-sasl]
      enabled = true
      port = smtp,submission
      filter = postfix-sasl
      logpath = /var/log/mail.log
      datepattern = %%Y-%%m-%%dT%%H:%%M:%%S
                    {^LN-BEG}%%Y-%%m-%%dT%%H:%%M:%%S
                    %%b %%d %%H:%%M:%%S
                    {^LN-BEG}%%b %%d %%H:%%M:%%S
      maxretry = 3
    mode: "0644"
  notify: Restart fail2ban
